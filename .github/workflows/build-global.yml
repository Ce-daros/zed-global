name: build-global

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release"
        type: boolean
        default: true
      tag_name:
        description: "Release tag. Empty uses global-<run number>-<date>."
        type: string
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Enable long paths in Git
        run: git config --system core.longpaths true

      - name: Enable long paths in Windows
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSVC Spectre libraries
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) {
            throw "Visual Studio Build Tools with MSVC were not found."
          }
          $args = "modify --installPath `"$installPath`" --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre --quiet --norestart"
          $process = Start-Process -FilePath $installer -ArgumentList $args -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -ne 0 -and $process.ExitCode -ne 3010) {
            Write-Error "Visual Studio Installer failed with exit code $($process.ExitCode)"
            exit $process.ExitCode
          }

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: wasm32-wasip2,wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --package zed --package cli --jobs 4

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-global-windows
          path: |
            target/release/zed.exe
            target/release/cli.exe
          if-no-files-found: error

  release:
    if: ${{ inputs.release }}
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        id: release
        shell: bash
        run: |
          tag="${{ inputs.tag_name }}"
          if [ -z "$tag" ]; then
            tag="global-${GITHUB_RUN_NUMBER}-$(date +'%Y%m%d')"
          fi
          mkdir -p zed-global-windows
          mv artifacts/zed-global-windows/zed.exe zed-global-windows/
          mv artifacts/zed-global-windows/cli.exe zed-global-windows/
          zip -r zed-global-windows.zip zed-global-windows
          sha256sum zed-global-windows.zip > sha256sums.txt
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release.outputs.tag }}
          tag_name: ${{ steps.release.outputs.tag }}
          body: |
            Zed Global build with compiled localization resources.

            Included locales:
            - English (United States)
            - Simplified Chinese
            - Traditional Chinese (Hong Kong)
            - Traditional Chinese (Taiwan)
            - Japanese
            - Korean
            - Spanish (Spain)
            - Russian
          draft: false
          make_latest: true
          files: |
            zed-global-windows.zip
            sha256sums.txt
